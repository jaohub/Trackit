<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackit - Recuperar Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Fundo com o degradê verde original */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b4b20 0%, #0a442d 50%, #01170c 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Card de Vidro Fosco (Igual ao Login) */
        .recovery-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .recovery-card h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .recovery-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 15px;
            color: #111111;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            background: #ffffff;
            border-color: #800020;
            box-shadow: 0 0 10px rgba(128, 0, 32, 0.2);
        }

        /* Botão Principal - Vinho com Letras Pretas */
        .btn-recovery {
            width: 100%;
            padding: 14px;
            background-color: #800020 !important;
            color: #000000 !important;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 15px;
        }

        .btn-recovery:hover {
            background-color: #5c0017 !important;
            transform: translateY(-1px);
        }

        /* Link para Voltar */
        .btn-back {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-back:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Estilo para as mensagens de erro/sucesso */
        .flash-msg {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="recovery-card">
        <h1>Recuperar Acesso</h1>
        <p>Insira seu CPF cadastrado para recuperar suas credenciais de acesso.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg" style="background-color: {% if category == 'sucesso' %}#d4edda{% else %}#f8d7da{% endif %}; 
                                            color: {% if category == 'sucesso' %}#155724{% else %}#721c24{% endif %};">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('recuperar_senha') }}" method="POST">
            <div class="input-group">
                <label for="cpf">CPF Cadastrado</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required autocomplete="off">
            </div>
            
            <button type="submit" class="btn-recovery">BUSCAR CREDENCIAIS</button>
        </form>
        
        <a href="{{ url_for('login') }}" class="btn-back">Voltar ao Login</a>
    </div>

</body>
</html>
