<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackit - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Fundo usando o degradê verde exato do seu projeto */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b4b20 0%, #0a442d 50%, #01170c 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Card de Login - Efeito de Vidro Fosco Moderno */
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-card h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 15px;
            color: #111111;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* Foco do input ativa o contorno Vinho */
        .input-group input:focus {
            background: #ffffff;
            border-color: #800020;
            box-shadow: 0 0 10px rgba(128, 0, 32, 0.2);
        }

        /* Botão de Login - Customizado em Vinho com Letras Pretas */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #800020 !important;
            color: #000000 !important;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #5c0017 !important;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Alinhamento dos links de rodapé */
        .login-footer {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-footer a {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-footer a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        .btn-register-link {
            color: #ffffff !important;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>TRACKIT</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div style="padding: 10px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; 
                          background-color: {% if category == 'sucesso' %}#d4edda{% else %}#f8d7da{% endif %}; 
                          color: {% if category == 'sucesso' %}#155724{% else %}#721c24{% endif %};">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <label for="cpf">CPF ou Usuário</label>
                <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF ou Admin" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-login">LOGIN</button>
        </form>
        
        <div class="login-footer">
            <a href="{{ url_for('cadastro_usuario') }}" class="btn-register-link">Criar Usuário</a>
            <a href="{{ url_for('recuperar_senha') }}">Esqueceu sua senha?</a>
        </div>
    </div>

</body>
</html>
