<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trackit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <h1>Trackit</h1>
            <p>Gestão de Ativos SENAI</p>
        </div>
        <form action="/login" method="POST">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" name="usuario" placeholder="Seu usuário" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div style="margin-top: 25px; text-align: center; font-size: 14px; display: flex; flex-direction: column; gap: 10px;">
            <a href="{{ url_for('recuperar_senha') }}" style="color: #dc3545; text-decoration: none; font-weight: 600;">Esqueceu o usuário ou a senha?</a>
            <span style="color: #666;">Não tem um perfil? <a href="{{ url_for('cadastro_usuario') }}" style="color: #007bff; text-decoration: none; font-weight: 600;">Cadastre-se aqui</a></span>
        </div>
    </div>
</body>
</html>
