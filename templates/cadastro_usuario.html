<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Trackit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
    
    <style>
        body {
            background: linear-gradient(135deg, #00b960 0%, #044f2d 50%, #01170c 100%) !important;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Garante que o card centralizado mantenha as proporções perfeitas */
        .register-container {
            background: white !important;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            text-align: center;
        }

        .register-container h2 {
            margin: 0 0 8px 0;
            color: #1e293b !important;
            font-size: 26px;
            font-weight: 700;
        }

        .register-container p {
            color: #64748b !important;
            font-size: 14px;
            margin: 0 0 28px 0;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569 !important;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            background-color: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #00b960;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 185, 96, 0.15);
        }

        .btn-submit {
            width: 100%;
            background-color: #2b7fff !important;
            color: white !important;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-submit:hover {
            background-color: #1a66ff !important;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 13px;
            color: #64748b !important;
        }

        .login-footer a {
            color: #2b7fff !important;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Criar Conta</h2>
        <p>Cadastre-se para solicitar ferramentas no laboratório</p>
        
        <form action="{{ url_for('cadastro_usuario') }}" method="POST">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>
            
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
            </div>
            
            <button type="submit" class="btn-submit">Finalizar Cadastro</button>
        </form>
        
        <div class="login-footer">
            Já tem uma conta? <a href="{{ url_for('login') }}">Fazer Login</a>
        </div>
    </div>

    <script>
        const cpfInput = document.getElementById('cpf');
        if (cpfInput) {
            cpfInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, "");
                if (value.length > 11) value = value.slice(0, 11);
                
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
                
                e.target.value = value;
            });
        }
    </script>
</body>
</html>  n
