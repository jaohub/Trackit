<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Trackit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body.cadastro-page {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .cadastro-card {
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f3f5;
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }
        .cadastro-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 8px 0;
            text-align: center;
        }
        .cadastro-header p {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px 0;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }
        .input-group input {
            font-family: 'Inter', sans-serif;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        .input-group input:focus {
            border-color: #2b7fff;
            box-shadow: 0 0 0 3px rgba(43, 127, 255, 0.1);
        }
        .btn-cadastro {
            width: 100%;
            padding: 14px;
            background-color: #2b7fff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-cadastro:hover {
            background-color: #1a66ff;
        }
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .footer-links a {
            color: #2b7fff;
            text-decoration: none;
            font-weight: 600;
        }
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        .alert-erro {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }
        .alert-sucesso {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }
    </style>
</head>
<body class="cadastro-page">
    <div class="cadastro-card">
        <div class="cadastro-header">
            <h1>Criar Conta</h1>
            <p>Cadastre-se para solicitar ferramentas no laboratório</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for categoria, mensagem in messages %}
                    <div class="alert {% if categoria == 'sucesso' %}alert-sucesso{% else %}alert-erro{% endif %}">
                        {{ mensagem }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('cadastro_usuario') }}" method="POST">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="input-group">
                <label>CPF</label>
                <input type="text" id="cpf_input" name="cpf" placeholder="000.000.000-00" autocomplete="off" required>
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Crie uma senha" required>
            </div>
            
            <button type="submit" class="btn-cadastro">Finalizar Cadastro</button>
        </form>
        
        <div class="footer-links">
            Já tem uma conta? <a href="{{ url_for('login') }}">Fazer Login</a>
        </div>
    </div>

    <script>
        // Máscara automática de CPF
        const cpfInput = document.getElementById('cpf_input');
        cpfInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ''); 
            if (value.length > 3) value = value.substring(0, 3) + '.' + value.substring(3);
            if (value.length > 7) value = value.substring(0, 7) + '.' + value.substring(7);
            if (value.length > 11) value = value.substring(0, 11) + '-' + value.substring(11, 13);
            e.target.value = value;
        });
    </script>
</body>
</html>
