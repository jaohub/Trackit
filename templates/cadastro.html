<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Ativo - Trackit</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}">Voltar ao Painel</a>
    </nav>

    <h1>Cadastrar Novo Equipamento</h1>
    
    <form action="/adicionar" method="POST">
        <label>Nome do Equipamento:</label>
        <input type="text" name="nome" required><br>

        <label>Número de Patrimônio:</label>
        <input type="text" name="patrimonio" required><br>

        <label>Laboratório/Setor:</label>
        <input type="text" name="laboratorio" required><br>

        <label>Status Inicial:</label>
        <select name="status">
            <option value="Ativo">Ativo</option>
            <option value="Manutenção">Manutenção</option>
        </select><br>

        <button type="submit">Salvar Ativo</button>
    </form>
</body>
</html>
